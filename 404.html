<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page not found | Calissa Man</title>
    <meta
      name="description"
      content="This page drifted off in a sampan. Return to Calissa Man's personal website."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600&family=Newsreader:opsz,wght@6..72,300;6..72,400;6..72,500&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    >
    <style>
      :root {
        color-scheme: light;
        --ivory: #fff7e8;
        --paper: rgba(255, 248, 230, 0.78);
        --ink: #14354c;
        --muted: #456f78;
        --teal: #087c91;
        --aqua: #86e6e2;
        --coral: #ee8d7a;
        --peach: #ffd5b8;
        --yellow: #f5c967;
        --shadow: rgba(76, 56, 38, 0.2);
        --sans: "Outfit", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --serif: "Newsreader", Georgia, serif;
        --hand: "Caveat", "Newsreader", Georgia, serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        min-height: 100%;
      }

      body {
        min-width: 320px;
        min-height: 100dvh;
        margin: 0;
        background: var(--ivory);
        color: var(--ink);
        font-family: var(--sans);
        line-height: 1.6;
        overflow-x: hidden;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .not-found {
        position: relative;
        display: grid;
        min-height: 100dvh;
        grid-template-rows: auto 1fr;
        padding: clamp(1rem, 2.8vw, 2rem);
        isolation: isolate;
        overflow: hidden;
      }

      .artwork {
        position: fixed;
        inset: 0;
        z-index: -3;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }

      .monogram-mark {
        position: fixed;
        right: clamp(1.5rem, 6vw, 5rem);
        bottom: clamp(1.5rem, 6vw, 4.5rem);
        z-index: 0;
        width: min(28vw, 19rem);
        min-width: 10rem;
        height: auto;
        opacity: 0.24;
        filter: saturate(0.92) brightness(1.08);
        mix-blend-mode: screen;
        pointer-events: none;
      }

      .not-found::before,
      .not-found::after,
      .water-gleam {
        position: fixed;
        inset: 0;
        pointer-events: none;
        content: "";
      }

      .not-found::before {
        z-index: -2;
        background:
          linear-gradient(90deg, rgba(255, 247, 232, 0.54) 0 30%, rgba(255, 247, 232, 0.12) 48%, rgba(255, 247, 232, 0.04)),
          radial-gradient(circle at 18% 18%, rgba(245, 201, 103, 0.2), transparent 18rem),
          linear-gradient(180deg, rgba(255, 247, 232, 0.04), rgba(8, 124, 145, 0.12) 100%);
      }

      .not-found::after {
        z-index: -1;
        background-image:
          radial-gradient(circle at 12% 22%, rgba(255, 247, 232, 0.18) 0 1px, transparent 1.4px),
          radial-gradient(circle at 72% 36%, rgba(8, 124, 145, 0.13) 0 1px, transparent 1.5px),
          radial-gradient(circle at 46% 78%, rgba(238, 141, 122, 0.14) 0 1.2px, transparent 1.7px);
        background-size: 22px 22px, 31px 31px, 37px 37px;
        mix-blend-mode: soft-light;
        opacity: 0.58;
      }

      .site-mark {
        position: relative;
        z-index: 2;
        display: inline-flex;
        align-items: center;
        gap: 0.48rem;
        width: fit-content;
        font-family: var(--serif);
        font-size: clamp(1.2rem, 2vw, 1.6rem);
        letter-spacing: 0.02em;
        text-shadow: 0 1px 18px rgba(255, 248, 230, 0.78);
      }

      .site-mark-monogram {
        width: clamp(1.65rem, 3vw, 2.25rem);
        height: clamp(1.65rem, 3vw, 2.25rem);
        border-radius: 999px;
        object-fit: cover;
        opacity: 0.88;
        filter: saturate(0.9) brightness(1.08);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 246, 0.44),
          0 0.42rem 1.25rem rgba(76, 56, 38, 0.14);
      }

      .dispatch {
        position: relative;
        z-index: 2;
        display: grid;
        align-content: center;
        justify-items: start;
        width: min(100%, 1180px);
        margin: 0 auto;
        padding: clamp(2rem, 7vw, 5.5rem) 0 clamp(4rem, 10vw, 8rem);
      }

      .dispatch-card {
        position: relative;
        display: grid;
        width: min(100%, 29.5rem);
        gap: clamp(0.85rem, 2vw, 1.25rem);
        padding: clamp(1.15rem, 3vw, 2rem);
        border: 1px solid rgba(255, 255, 246, 0.54);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 249, 232, 0.82), rgba(134, 230, 226, 0.16)),
          var(--paper);
        box-shadow:
          0 1.3rem 3.5rem var(--shadow),
          inset 0 1px 0 rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(16px) saturate(1.05);
        overflow: hidden;
      }

      .dispatch-card::before {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, transparent, rgba(134, 230, 226, 0.16) 52%, transparent),
          repeating-linear-gradient(135deg, rgba(8, 124, 145, 0.12) 0 1px, transparent 1px 18px);
        opacity: 0.32;
        pointer-events: none;
        content: "";
      }

      .dispatch-card > * {
        position: relative;
        z-index: 1;
      }

      .eyebrow {
        margin: 0;
        color: var(--teal);
        font-size: 0.78rem;
        font-weight: 600;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      h1 {
        max-width: 10ch;
        margin: 0;
        color: var(--ink);
        font-family: var(--hand);
        font-size: clamp(3.05rem, 6.4vw, 5.35rem);
        font-weight: 600;
        line-height: 0.9;
        letter-spacing: 0;
        text-wrap: balance;
      }

      .subcopy {
        max-width: 29rem;
        margin: 0;
        color: var(--muted);
        font-family: var(--serif);
        font-size: clamp(1rem, 1.6vw, 1.12rem);
        line-height: 1.52;
      }

      .return-home {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: fit-content;
        min-height: 3rem;
        padding: 0.74rem 1.08rem;
        border: 1px solid rgba(8, 124, 145, 0.34);
        border-radius: 999px;
        background:
          linear-gradient(135deg, rgba(255, 255, 246, 0.86), rgba(255, 213, 184, 0.36)),
          rgba(255, 247, 232, 0.78);
        color: var(--ink);
        font-size: 0.82rem;
        font-weight: 600;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.76);
        transition:
          border-color 220ms ease,
          transform 260ms cubic-bezier(0.16, 1, 0.3, 1),
          background 220ms ease;
      }

      .return-home:hover,
      .return-home:focus-visible {
        border-color: rgba(8, 124, 145, 0.58);
        background:
          linear-gradient(135deg, rgba(255, 255, 246, 0.94), rgba(134, 230, 226, 0.3)),
          rgba(255, 247, 232, 0.84);
        outline: none;
        transform: translateY(-1px);
      }

      .return-home:focus-visible {
        box-shadow:
          0 0 0 3px rgba(255, 247, 232, 0.86),
          0 0 0 6px rgba(8, 124, 145, 0.34);
      }

      .return-home:active {
        transform: translateY(1px);
      }

      .water-gleam {
        z-index: -1;
        top: 32%;
        background:
          repeating-linear-gradient(
            170deg,
            transparent 0 5.2rem,
            rgba(255, 255, 246, 0.22) 5.25rem 5.34rem,
            transparent 5.44rem 10.8rem
          ),
          repeating-linear-gradient(
            8deg,
            transparent 0 6.7rem,
            rgba(134, 230, 226, 0.16) 6.78rem 6.9rem,
            transparent 7rem 13.2rem
          );
        mix-blend-mode: screen;
        opacity: 0.46;
        mask-image: linear-gradient(180deg, transparent, black 18%, black 92%, transparent);
        transform: translate3d(-8%, 0, 0);
        animation: water-gleam 11s ease-in-out infinite alternate;
      }

      .interaction-layer {
        position: fixed;
        inset: 0;
        z-index: 1;
        overflow: hidden;
        pointer-events: none;
      }

      .water-ripple {
        position: absolute;
        left: var(--x);
        top: var(--y);
        width: 1rem;
        height: 1rem;
        border: 1px solid rgba(255, 255, 246, 0.68);
        border-radius: 999px;
        box-shadow:
          0 0 0 1px rgba(134, 230, 226, 0.28),
          inset 0 0 1.8rem rgba(255, 255, 246, 0.34);
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.2);
        animation: ripple-out 1.45s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .water-ripple::after {
        position: absolute;
        inset: 22%;
        border: 1px solid rgba(255, 213, 184, 0.42);
        border-radius: inherit;
        content: "";
      }

      .otter-bubble {
        position: absolute;
        left: var(--x);
        top: var(--y);
        max-width: min(17rem, calc(100vw - 2rem));
        padding: 0.72rem 0.86rem;
        border: 1px solid rgba(255, 255, 246, 0.68);
        border-radius: 8px;
        background:
          linear-gradient(135deg, rgba(255, 249, 232, 0.92), rgba(134, 230, 226, 0.24)),
          rgba(255, 247, 232, 0.84);
        color: var(--ink);
        font-family: var(--serif);
        font-size: clamp(0.92rem, 1.7vw, 1.05rem);
        line-height: 1.35;
        box-shadow:
          0 1rem 2.5rem rgba(76, 56, 38, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.78);
        backdrop-filter: blur(14px) saturate(1.08);
        transform: translate(-50%, calc(-100% - 0.8rem)) scale(0.94);
        animation: otter-note 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      .otter-bubble::after {
        position: absolute;
        left: 50%;
        bottom: -0.42rem;
        width: 0.8rem;
        height: 0.8rem;
        border-right: 1px solid rgba(255, 255, 246, 0.68);
        border-bottom: 1px solid rgba(255, 255, 246, 0.68);
        background: rgba(255, 247, 232, 0.86);
        content: "";
        transform: translateX(-50%) rotate(45deg);
      }

      @keyframes ripple-out {
        0% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.2);
        }

        18% {
          opacity: 0.78;
        }

        100% {
          opacity: 0;
          transform: translate(-50%, -50%) scale(9);
        }
      }

      @keyframes otter-note {
        0% {
          opacity: 0;
          transform: translate(-50%, calc(-100% - 0.1rem)) scale(0.94);
        }

        12%,
        78% {
          opacity: 1;
          transform: translate(-50%, calc(-100% - 0.8rem)) scale(1);
        }

        100% {
          opacity: 0;
          transform: translate(-50%, calc(-100% - 1.25rem)) scale(0.98);
        }
      }

      @keyframes water-gleam {
        0% {
          opacity: 0.3;
          transform: translate3d(-9%, 0.5rem, 0) skewY(-1deg);
        }

        55% {
          opacity: 0.5;
        }

        100% {
          opacity: 0.4;
          transform: translate3d(7%, -0.3rem, 0) skewY(1deg);
        }
      }

      @media (max-width: 820px) {
        .artwork {
          object-position: 59% center;
        }

        .monogram-mark {
          right: -1.4rem;
          bottom: 1.1rem;
          width: 13rem;
          min-width: 0;
          opacity: 0.16;
        }

        .not-found::before {
          background:
            linear-gradient(180deg, rgba(255, 247, 232, 0.72), rgba(255, 247, 232, 0.28) 44%, rgba(255, 247, 232, 0.48)),
            linear-gradient(90deg, rgba(255, 247, 232, 0.5), transparent 60%);
        }

        .dispatch {
          align-content: start;
          padding-top: clamp(2.25rem, 10vw, 3.8rem);
          padding-bottom: clamp(1rem, 7vw, 3rem);
        }

        .dispatch-card {
          width: min(100%, 24.5rem);
          gap: 0.72rem;
          padding: 1rem;
        }

        h1 {
          max-width: 9.4ch;
          font-size: clamp(2.35rem, 11.2vw, 3.65rem);
        }

        .subcopy {
          font-size: 0.94rem;
        }

        .water-gleam {
          top: 24%;
          opacity: 0.38;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 1ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 1ms !important;
        }

        .water-gleam {
          animation: none !important;
          transform: none;
        }

        .water-ripple,
        .otter-bubble {
          animation-duration: 1ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="not-found" aria-labelledby="page-title">
      <img
        class="artwork"
        src="assets/error404otter.png"
        alt=""
        aria-hidden="true"
      >
      <img
        class="monogram-mark"
        src="assets/404-monogram.png"
        alt=""
        aria-hidden="true"
      >
      <div class="water-gleam" aria-hidden="true"></div>
      <div class="interaction-layer" aria-hidden="true"></div>
      <a class="site-mark" href="/" aria-label="Return to Calissa Man home">
        <img class="site-mark-monogram" src="assets/site-monogram.png" alt="" aria-hidden="true">
        <span>Calissa</span>
      </a>

      <section class="dispatch">
        <div class="dispatch-card">
          <p class="eyebrow">404 dispatch</p>
          <h1 id="page-title">This page drifted off in a sampan.</h1>
          <p class="subcopy">
            Maybe it crossed the bay, missed the cable car, or got lost somewhere between
            Singapore and San Francisco.
          </p>
          <a class="return-home" href="/">Return home</a>
        </div>
      </section>
    </main>
    <script>
      (() => {
        const layer = document.querySelector(".interaction-layer");
        const notes = [
          "go back to calissa's website lah",
          "just keep paddling",
          "hey! that tickles",
          "did you know that the Singaporean otter is the world's first otter hybrid",
          "dad is a smooth-coated otter and mum is a small-clawed otter",
        ];
        let noteIndex = 0;

        if (!layer) return;

        const removeAfter = (element, delay) => {
          window.setTimeout(() => element.remove(), delay);
        };

        const addRipple = (x, y) => {
          const ripple = document.createElement("span");
          ripple.className = "water-ripple";
          ripple.style.setProperty("--x", `${x}px`);
          ripple.style.setProperty("--y", `${y}px`);
          layer.append(ripple);
          removeAfter(ripple, 1500);
        };

        const addOtterNote = (x, y) => {
          layer.querySelectorAll(".otter-bubble").forEach((bubble) => bubble.remove());
          const bubble = document.createElement("span");
          bubble.className = "otter-bubble";
          bubble.textContent = notes[noteIndex % notes.length];
          noteIndex += 1;
          bubble.style.setProperty("--x", `${Math.min(Math.max(x, 112), window.innerWidth - 112)}px`);
          bubble.style.setProperty("--y", `${Math.min(Math.max(y, 136), window.innerHeight - 28)}px`);
          layer.append(bubble);
          removeAfter(bubble, 2100);
        };

        const inOtterZone = (x, y) => {
          const mobile = window.innerWidth <= 820;
          const centerX = window.innerWidth * (mobile ? 0.5 : 0.57);
          const centerY = window.innerHeight * (mobile ? 0.68 : 0.62);
          const radiusX = window.innerWidth * (mobile ? 0.34 : 0.17);
          const radiusY = window.innerHeight * (mobile ? 0.28 : 0.25);
          return ((x - centerX) / radiusX) ** 2 + ((y - centerY) / radiusY) ** 2 <= 1;
        };

        const inWaterZone = (y) => y > window.innerHeight * 0.34;

        document.addEventListener("pointerdown", (event) => {
          if (event.target.closest("a, button, .dispatch-card")) return;

          const { clientX: x, clientY: y } = event;
          if (!inWaterZone(y)) return;

          addRipple(x, y);
          if (inOtterZone(x, y)) {
            addOtterNote(x, y);
          }
        }, { passive: true });
      })();
    </script>
  </body>
</html>
